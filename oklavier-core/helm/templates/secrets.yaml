{{/*
SECURITY: validate every credential at install time. Previously the chart
accepted the literal string "REPLACE_ME" as both the Postgres password and
the bootstrap admin password — a `helm install` without overrides produced
a working deployment with admin@oklavier.local : REPLACE_ME, owning the
cluster from any reachable login page.
*/}}
{{- $dbPassword := required "database.password is required (set --set database.password=...; do not use REPLACE_ME)" .Values.database.password }}
{{- if eq $dbPassword "REPLACE_ME" }}{{ fail "database.password must not be the placeholder REPLACE_ME" }}{{- end }}
{{- if lt (len $dbPassword) 16 }}{{ fail "database.password must be at least 16 characters" }}{{- end }}

{{- $adminPassword := required "admin.password is required (set --set admin.password=...; do not use REPLACE_ME)" .Values.admin.password }}
{{- if eq $adminPassword "REPLACE_ME" }}{{ fail "admin.password must not be the placeholder REPLACE_ME" }}{{- end }}
{{- if lt (len $adminPassword) 12 }}{{ fail "admin.password must be at least 12 characters" }}{{- end }}

{{- $existing := dict }}
{{- $lookup := (lookup "v1" "Secret" .Release.Namespace "oklavier-secrets") }}
{{- if and $lookup $lookup.data }}
  {{- $existing = $lookup.data }}
{{- end }}

{{- $jwtSecret := .Values.jwtSecret | default (get $existing "jwt-secret" | b64dec | default (randAlphaNum 64)) }}
{{- if lt (len $jwtSecret) 32 }}{{ fail "jwtSecret must be at least 32 characters (use `openssl rand -hex 32`)" }}{{- end }}

{{- $internalSecret := .Values.internalSecret | default (get $existing "internal-secret" | b64dec | default (randAlphaNum 64)) }}
{{- if lt (len $internalSecret) 32 }}{{ fail "internalSecret must be at least 32 characters" }}{{- end }}

{{- $encryptionKey := .Values.encryptionKey | default (get $existing "encryption-key" | b64dec | default (randAlphaNum 64)) }}
{{- if lt (len $encryptionKey) 32 }}{{ fail "encryptionKey must be at least 32 characters" }}{{- end }}

apiVersion: v1
kind: Secret
metadata:
  name: oklavier-db-credentials
  namespace: {{ include "oklavier.namespace" . }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.database.user | quote }}
  password: {{ $dbPassword | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: oklavier-secrets
  namespace: {{ include "oklavier.namespace" . }}
type: Opaque
stringData:
  jwt-secret: {{ $jwtSecret | quote }}
  admin-password: {{ $adminPassword | quote }}
  internal-secret: {{ $internalSecret | quote }}
  encryption-key: {{ $encryptionKey | quote }}
