apiVersion: v1
kind: Secret
metadata:
  name: oklavier-db-credentials
  namespace: {{ include "oklavier.namespace" . }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.database.user | quote }}
  password: {{ .Values.database.password | quote }}
---
{{- $existing := dict }}
{{- $lookup := (lookup "v1" "Secret" .Release.Namespace "oklavier-secrets") }}
{{- if and $lookup $lookup.data }}
  {{- $existing = $lookup.data }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: oklavier-secrets
  namespace: {{ include "oklavier.namespace" . }}
type: Opaque
stringData:
  jwt-secret: {{ .Values.jwtSecret | default (get $existing "jwt-secret" | b64dec | default (randAlphaNum 64)) | quote }}
  admin-password: {{ .Values.admin.password | quote }}
  internal-secret: {{ .Values.internalSecret | default (get $existing "internal-secret" | b64dec | default (randAlphaNum 64)) | quote }}
