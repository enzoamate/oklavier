apiVersion: apps/v1
kind: Deployment
metadata:
  name: oklavier-api
  namespace: {{ include "oklavier.namespace" . }}
  labels:
    app: oklavier-api
    {{- include "oklavier.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: oklavier-api
  template:
    metadata:
      labels:
        app: oklavier-api
    spec:
      {{- if .Values.imagePullSecret.enabled }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret.name }}
      {{- end }}
      {{- if gt (int .Values.api.replicas) 1 }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: oklavier-api
                topologyKey: kubernetes.io/hostname
      {{- end }}
      containers:
        - name: oklavier-api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: DB_HOST
              value: "oklavier-db-rw"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: oklavier-db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oklavier-db-credentials
                  key: password
            - name: DB_NAME
              value: {{ .Values.database.name | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oklavier-secrets
                  key: jwt-secret
            - name: OKLAVIER_ADMIN_NAME
              value: {{ .Values.admin.name | quote }}
            - name: OKLAVIER_ADMIN_EMAIL
              value: {{ .Values.admin.email | quote }}
            - name: OKLAVIER_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oklavier-secrets
                  key: admin-password
            - name: OKLAVIER_INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: oklavier-secrets
                  key: internal-secret
            - name: VALKEY_URL
              value: "oklavier-valkey:6379"
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: oklavier-api
  namespace: {{ include "oklavier.namespace" . }}
spec:
  selector:
    app: oklavier-api
  ports:
    - port: 8080
      targetPort: 8080
