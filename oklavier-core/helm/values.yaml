# Oklavier Control Plane Helm Values

global:
  namespace: oklavier

# Frontend (Next.js) - pure UI + proxy, no DB access
front:
  image:
    repository: ghcr.io/enzoamate/oklavier-frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    OKLAVIER_API: "http://oklavier-api:8080"

# API (Go Fiber) - handles auth, sessions, workspaces, everything
api:
  image:
    repository: ghcr.io/enzoamate/oklavier-api
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi

# Database credentials (shared between CNPG + API)
# SECURITY: do NOT use the literal string "REPLACE_ME". The chart's secrets
# template now rejects it (and any value shorter than 16 chars). Generate one:
#   --set database.password="$(openssl rand -base64 24 | tr -d '+/=')"
database:
  enabled: true
  instances: 2
  size: 10Gi
  storageClass: ""
  name: "oklavier"
  user: "oklavier"
  password: ""

# Initial admin account (created on first boot)
# SECURITY: required and must not be "REPLACE_ME" (>= 12 chars).
#   --set admin.password="$(openssl rand -base64 18 | tr -d '+/=')"
admin:
  name: "Admin"
  email: "admin@oklavier.local"
  password: ""

# Mutual TLS for agent ↔ core (opt-in defense in depth).
# When enabled, mount an existing secret containing tls.crt + tls.key + ca.crt
# (e.g. produced by cert-manager Certificate resource) and the API will refuse
# any /api/agent/* call that doesn't present a client cert signed by ca.crt.
mtls:
  enabled: false
  secretName: ""

# JWT secret for API tokens (>= 32 chars). Auto-generated if empty AND no
# pre-existing oklavier-secrets is found in the cluster.
jwtSecret: ""

# Encryption-at-rest key, distinct from jwtSecret (>= 32 chars). Auto-generated
# if empty. Decoupling these prevents one leak from compromising both.
encryptionKey: ""

# Internal secret for Next.js <-> Go API communication
internalSecret: ""

# Ingress
ingress:
  enabled: false
  host: oklavier.example.com
  tls: false
  annotations: {}

# Valkey (Redis-compatible) for rate limiting and session cache
valkey:
  enabled: true
  image:
    repository: valkey/valkey
    tag: "8-alpine"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Image pull secret
imagePullSecret:
  enabled: false
  name: oklavier-registry
  registry: ""
  username: ""
  password: ""
