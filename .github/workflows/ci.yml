name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  GO_VERSION: '1.25.0'
  NODE_VERSION: '22'

jobs:

  lint-go:
    name: Lint & test Go
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [oklavier-core/backend, oklavier-agent/backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ matrix.component }}/go.sum
      - name: go vet
        working-directory: ${{ matrix.component }}
        run: go vet ./...
      - name: gofmt
        working-directory: ${{ matrix.component }}
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Files need gofmt:"
            echo "$unformatted"
            exit 1
          fi
      - name: go build
        working-directory: ${{ matrix.component }}
        run: go build ./...
      - name: go test
        working-directory: ${{ matrix.component }}
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: gosec — fail on HIGH+
        uses: securego/gosec@master
        with:
          # -severity high: only fail on HIGH and CRITICAL
          # -confidence medium: skip very-low-confidence noise
          # Exclusions are URL/path tainting from env vars — we *want*
          # operators to configure controlPlane/cert paths/etc. via env. The
          # env values come from the cluster's Helm-managed secrets, not user
          # input.
          #   G304/G703 — file path from env (cert/key/CA files)
          #   G306      — file permissions on tmp writes (already 0600)
          #   G104      — unhandled errors on log.Printf
          #   G704      — http.NewRequest URL built from env (controlPlane,
          #               s3Endpoint, etc.) — not attacker-controlled
          args: -severity high -confidence medium -exclude=G304,G306,G703,G104,G704 ./${{ matrix.component }}/...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ${{ matrix.component }}/coverage.out
          flags: ${{ matrix.component == 'oklavier-core/backend' && 'core' || 'agent' }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  lint-frontend:
    name: Lint & build frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oklavier-core/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: oklavier-core/frontend/package-lock.json
      - run: npm ci
      - name: lint
        run: npm run lint
      - name: typecheck
        run: npx tsc --noEmit
      - name: build
        run: npm run build
        env:
          NEXT_PUBLIC_OKLAVIER_API: http://oklavier-api.oklavier.svc.cluster.local:8080

  lint-helm:
    name: Helm lint & template
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart: [oklavier-core/helm, oklavier-agent/helm]
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: 'v3.16.1'
      - name: helm lint
        run: helm lint ${{ matrix.chart }}
      - name: helm template (smoke render)
        run: |
          helm template test ${{ matrix.chart }} \
            --set jwtSecret=test --set internalSecret=test \
            --set database.password=test --set admin.password=test \
            --set agent.name=test --set agent.token=test \
            --set agent.controlPlane=https://test.example.com \
            --set agent.jwtSecret=test \
            > /dev/null

  docker-build:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: oklavier-api
            context: oklavier-core/backend
          - name: oklavier-frontend
            context: oklavier-core/frontend
          - name: oklavier-agent
            context: oklavier-agent/backend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: false
          load: true
          tags: ${{ matrix.name }}:ci
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
