version: 2
updates:

  - package-ecosystem: gomod
    directory: /oklavier-core/backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      go-deps:
        patterns: ["*"]

  - package-ecosystem: gomod
    directory: /oklavier-agent/backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      go-deps:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /oklavier-core/frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-deps:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /oklavier-core/backend
    schedule: { interval: weekly }

  - package-ecosystem: docker
    directory: /oklavier-core/frontend
    schedule: { interval: weekly }

  - package-ecosystem: docker
    directory: /oklavier-agent/backend
    schedule: { interval: weekly }
