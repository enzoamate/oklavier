# Oklavier Agent Helm Values

agent:
  name: ""
  token: ""
  controlPlane: ""
  region: "default"
  namespace: oklavier-agent
  publicURL: ""  # Set to https://agent-name.example.com for WebRTC
  frontendURL: ""  # Public URL for browser redirects (e.g. https://oklavier.example.com)
  jwtSecret: ""    # Same as core JWT_SECRET — for session token verification
  valkeyURL: "oklavier-valkey.oklavier.svc.cluster.local:6379"
  guacdAddress: "guacd:4822"

# Opt-in mutual TLS for agent ↔ core. When enabled, the secret must contain
# tls.crt + tls.key + ca.crt (typical cert-manager Certificate output).
mtls:
  enabled: false
  secretName: ""

image:
  repository: ghcr.io/enzoamate/oklavier-agent
  tag: latest
  pullPolicy: IfNotPresent

replicas: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

service:
  type: LoadBalancer
  port: 80
  webrtcPort: 443

# RBAC - agent needs permissions to create pods/services/PVCs
rbac:
  create: true

guacd:
  enabled: true
  replicas: 1
  # Default points at our downstream fork that adds RDP virtual channels
  # missing from upstream guacd: URBDRC (USB) and rdpecam (webcam).
  # Source: https://github.com/enzoamate/guacamole-server (oklavier-channels branch).
  # To opt back into upstream, set guacd.image.repository=guacamole/guacd and
  # guacd.image.tag=1.6.0 — patches are additive only, not behaviour-changing
  # for channels guacd already supports.
  image:
    repository: ghcr.io/enzoamate/oklavier-guacd
    tag: "oklavier-channels"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Session recordings volume (shared between agent and guacd containers)
recordings:
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
    # RWO works with hostPath/local SCs (openebs-hostpath, local-path).
    # Set to ReadWriteMany only on an RWX-capable SC (NFS/CephFS/Longhorn).
    accessMode: ReadWriteOnce
  # Local sweeper deletes /tmp/guac-recordings files older than this. Off-cluster
  # deployments that upload to S3 don't need this; it's the safety net for the
  # storage_type=local case.
  retentionDays: 7

# Default-deny NetworkPolicy on workspace pods (lateral movement protection).
# Off by default for backwards compatibility — enable in production.
networkPolicy:
  enabled: false
  extraEgress: []

imagePullSecret:
  enabled: false
  name: oklavier-agent-registry
  registry: ""
  username: ""
  password: ""
